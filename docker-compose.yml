services:
  calendar-mongo:
    image: mongo:7
    container_name: calendar-mongo
    restart: unless-stopped
    volumes:
      - calendar_mongo_data:/data/db
    ports:
      - "127.0.0.1:27018:27017"

  calendar-api:
    build: ./server
    container_name: calendar-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://calendar-mongo:27017/calendar
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET:-calendar-jwt-secret-production}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - CLIENT_URL=${CLIENT_URL:-http://46.175.145.85:3001}
    volumes:
      - calendar_uploads:/app/uploads
    depends_on:
      - calendar-mongo

  calendar-web:
    build: ./client
    container_name: calendar-web
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - calendar-api

volumes:
  calendar_mongo_data:
  calendar_uploads:
